name: Keep promo issue fresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/**
      - install.sh
      - skills/**
      - templates/**

permissions:
  contents: read
  issues: write

jobs:
  update-promo-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Create or refresh promo issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'What Codex Context Pack solves';
            const promo = fs.readFileSync('docs/promo.md', 'utf8').trim();
            const body = `${promo}\n\n---\nLast refreshed: ${new Date().toISOString()}\nRepo: https://github.com/${context.repo.owner}/${context.repo.repo}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
            core.info(`Created issue #${created.data.number}`);
